<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Répartition des élèves</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            font-size: 16px;
        }
        .maison {
            border: 2px solid #333;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            vertical-align: top;
        }
        .Serdaigle { background-color: #1e90ff; color: white; }
        .Gryffondor { background-color: #ff0000; color: white; }
        .Poufsouffle { background-color: #ffd700; color: black; }
        .Serpentard { background-color: #228b22; color: white; }
    </style>
</head>
<body>
    <h1>Choixpeau magique</h1>

    <p><strong>Élève courant :</strong> <span id="currentStudent">Aucun</span></p>

    <button id="neweleve">Nouvel élève</button>
    <button id="choix" disabled>Choixpeau</button>

    <div class="maison Serdaigle">
        <h3>Serdaigle</h3>
        <ul id="Serdaigle"></ul>
    </div>
    <div class="maison Gryffondor">
        <h3>Gryffondor</h3>
        <ul id="Gryffondor"></ul>
    </div>
    <div class="maison Poufsouffle">
        <h3>Poufsouffle</h3>
        <ul id="Poufsouffle"></ul>
    </div>
    <div class="maison Serpentard">
        <h3>Serpentard</h3>
        <ul id="Serpentard"></ul>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
